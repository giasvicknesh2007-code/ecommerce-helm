name: Helm CI

on:
  push:
    branches:
      - main

jobs:
  helm-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Helm Version
        run: helm version

      - name: Lint Helm Chart
        run: helm lint .

      - name: Render Templates
        run: helm template ecommerce .
